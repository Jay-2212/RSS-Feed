name: Curate News

on:
  workflow_dispatch:

jobs:
  curate:
    runs-on: ubuntu-latest
    env:
      # Put GEMINI_API_KEY in GitHub repo secrets. Pipeline will auto-fallback to mock mode if empty.
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GEMINI_MODEL: ${{ vars.GEMINI_MODEL || 'gemini-2.0-flash' }}
      GEOTAG_MODE: auto
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Validate secret wiring
        run: |
          if [ -n "${GEMINI_API_KEY}" ]; then
            echo "GEMINI_API_KEY detected in environment."
          else
            echo "GEMINI_API_KEY is not set. Geotagger will use mock mode."
          fi

      - name: Run pipeline (Phase 1-4)
        run: npm run run:pipeline
