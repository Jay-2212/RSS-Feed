name: Curate News

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  curate:
    runs-on: ubuntu-latest
    env:
      # Put KIMI_CODE_API in GitHub repo secrets. Pipeline will auto-fallback to mock mode if empty.
      KIMI_CODE_API: ${{ secrets.KIMI_CODE_API }}
      KIMI_BASE_URL: ${{ vars.KIMI_BASE_URL || 'https://api.kimi.com/coding/v1' }}
      KIMI_MODEL: ${{ vars.KIMI_MODEL || 'kimi-k2-0905-preview' }}
      KIMI_FALLBACK_MODELS: ${{ vars.KIMI_FALLBACK_MODELS || 'kimi-k2-turbo-preview,kimi-for-coding' }}
      GEOTAG_MODE: ${{ vars.GEOTAG_MODE || 'auto' }}
      GEOTAG_BATCH_SIZE: ${{ vars.GEOTAG_BATCH_SIZE || '40' }}
      GEOTAG_MAX_API_BATCHES: ${{ vars.GEOTAG_MAX_API_BATCHES || '1' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Validate secret wiring
        run: |
          if [ -n "${KIMI_CODE_API}" ]; then
            echo "KIMI_CODE_API detected in environment."
          else
            echo "KIMI_CODE_API is not set. Geotagger will use mock mode."
          fi

      - name: Run pipeline (Phase 1-5)
        run: npm run run:pipeline

      - name: Run QA checks
        run: npm run qa

      - name: Commit generated artifacts
        run: |
          if [ -z "$(git status --porcelain -- articles.json lastUpdated.txt)" ]; then
            echo "No generated artifact changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add articles.json lastUpdated.txt
          git commit -m "chore(data): update generated feed artifacts"
          git push
