name: Curate News

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  curate:
    runs-on: ubuntu-latest
    env:
      # Put INCEPTION_API_KEY in GitHub repo secrets. Pipeline will auto-fallback to mock mode if empty.
      INCEPTION_API_KEY: ${{ secrets.INCEPTION_API_KEY }}
      INCEPTION_BASE_URL: ${{ vars.INCEPTION_BASE_URL || 'https://api.inceptionlabs.ai/v1' }}
      INCEPTION_MODEL: ${{ vars.INCEPTION_MODEL || 'mercury-2' }}
      GEOTAG_MODE: ${{ vars.GEOTAG_MODE || 'auto' }}
      GEOTAG_BATCH_SIZE: ${{ vars.GEOTAG_BATCH_SIZE || '60' }}
      GEOTAG_MAX_API_BATCHES: ${{ vars.GEOTAG_MAX_API_BATCHES || '0' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Validate secret wiring
        run: |
          if [ -n "${INCEPTION_API_KEY}" ]; then
            echo "INCEPTION_API_KEY detected in environment."
          else
            echo "INCEPTION_API_KEY is not set. Geotagger will use mock mode."
          fi

      - name: Run pipeline (Phase 1-5)
        run: npm run run:pipeline

      - name: Run QA checks
        run: npm run qa

      - name: Commit generated artifacts
        run: |
          if [ -z "$(git status --porcelain -- articles.json lastUpdated.txt feedState.json runHistory.json)" ]; then
            echo "No generated artifact changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add articles.json lastUpdated.txt feedState.json runHistory.json
          git commit -m "chore(data): update generated feed artifacts"
          git push
