name: Curate News

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  curate:
    runs-on: ubuntu-latest
    env:
      # Put GEMINI_API_KEY in GitHub repo secrets. Pipeline will auto-fallback to mock mode if empty.
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GEMINI_MODEL: ${{ vars.GEMINI_MODEL || 'gemini-2.5-flash-lite' }}
      GEMINI_FALLBACK_MODELS: ${{ vars.GEMINI_FALLBACK_MODELS || 'gemini-2.0-flash-lite,gemini-2.0-flash' }}
      GEOTAG_MODE: auto
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Validate secret wiring
        run: |
          if [ -n "${GEMINI_API_KEY}" ]; then
            echo "GEMINI_API_KEY detected in environment."
          else
            echo "GEMINI_API_KEY is not set. Geotagger will use mock mode."
          fi

      - name: Run pipeline (Phase 1-5)
        run: npm run run:pipeline

      - name: Commit generated artifacts
        run: |
          if [ -z "$(git status --porcelain -- articles.json lastUpdated.txt)" ]; then
            echo "No generated artifact changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add articles.json lastUpdated.txt
          git commit -m "chore(data): update generated feed artifacts"
          git push
