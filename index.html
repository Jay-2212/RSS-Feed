<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RSS News Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      crossorigin=""
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"
    />
    <link rel="stylesheet" href="assets/styles.css" />
  </head>
  <body
    data-github-owner="Jay-2212"
    data-github-repo="RSS-Feed"
    data-github-workflow="curate.yml"
    data-github-ref="main"
  >
    <div class="ambient ambient-one"></div>
    <div class="ambient ambient-two"></div>

    <header class="topbar">
      <div class="topbar-brand">
        <p class="eyebrow">GitHub Pages Dashboard</p>
        <h1>RSS News Hub</h1>
      </div>
      <div class="topbar-right">
        <div class="header-meta">
          <p>Last Updated</p>
          <strong id="last-updated">Loading...</strong>
        </div>
        <div id="top-stats" class="top-stats"></div>
        <div class="top-actions">
          <button id="refresh-button" class="map-toggle">Refresh</button>
          <a href="logbook.html" class="map-toggle logbook-link">Open Logbook</a>
          <button id="map-toggle" class="map-toggle">Hide Map</button>
        </div>
        <p id="refresh-status" class="refresh-status"></p>
      </div>
    </header>

    <main class="layout">
      <section id="map-panel" class="panel map-panel">
        <div class="panel-header">
          <h2>World Map</h2>
          <div class="panel-actions">
            <button id="map-fullscreen" class="ghost-btn">Full Map</button>
            <button id="clear-country-filter" class="ghost-btn">Clear Country</button>
          </div>
        </div>
        <p id="selected-country-label" class="subtle">Country filter: All countries</p>
        <div id="world-map" class="world-map"></div>
      </section>

      <section class="panel feed-panel">
        <div class="controls">
          <input id="search-input" type="search" placeholder="Search headline, excerpt, source..." />
          <div class="filter-group">
            <p class="filter-label">Global Lens</p>
            <div id="category-filters" class="chips"></div>
          </div>
          <div class="filter-group">
            <p class="filter-label">Topic Tags</p>
            <div id="tag-filters" class="chips chips-tags"></div>
          </div>
          <label class="saved-only">
            <input id="read-later-only" type="checkbox" />
            Saved only
          </label>
        </div>
        <section id="priority-strip" class="priority-strip"></section>
        <section id="articles-grid" class="articles-grid"></section>
      </section>
    </main>

    <aside id="reader-overlay" class="reader-overlay" aria-hidden="true">
      <section
        id="reader-panel"
        class="reader-panel"
        role="dialog"
        aria-modal="true"
        aria-labelledby="reader-title"
      >
        <header class="reader-header">
          <h2 id="reader-title">Article</h2>
          <div class="reader-actions">
            <button id="reader-fullscreen" class="ghost-btn icon-btn" aria-label="Toggle full screen">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path
                  d="M4 9V4h5M20 9V4h-5M4 15v5h5M20 15v5h-5"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.8"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
              </svg>
            </button>
            <button id="reader-close" class="ghost-btn">Close</button>
          </div>
        </header>
        <p id="reader-meta" class="reader-meta"></p>
        <article id="reader-content" class="reader-content"></article>
      </section>
    </aside>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      crossorigin=""
    ></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
    <script type="module" src="assets/app.js"></script>
  </body>
</html>
